services:
  market-analyst-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-analyst-app
    ports:
      - "8085:8080"
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - C:/Users/prade/AppData/Roaming/gcloud:/root/.config/gcloud:ro
      - ./market_analyst:/app/market_analyst
      - ./skills:/app/skills
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
